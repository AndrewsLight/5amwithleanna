<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layer 01</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: black;
      color: #e0e0e0;
    }

    /* Grid background */
    .background-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      height: 100vh;
      width: 100vw;
    }

    .cell {
      position: relative;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.7) contrast(1.2) saturate(0.8);
    }

    /* Overlay text */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      z-index: 10;
      animation: flicker 6s infinite;
    }

    .overlay h1 {
      font-size: 2.8rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #c0ffea;
      text-shadow: 0 0 8px #00ffcc, 0 0 20px #00ffcc;
      animation: glitch 2s infinite;
    }

    /* Flicker effect */
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 1;
      }
      20%, 24%, 55% {
        opacity: 0.7;
      }
    }

    /* Glitch effect */
    @keyframes glitch {
      0% { transform: translate(0,0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>
<body>
  <div class="background-grid">
    <div class="cell"><img src="background1.gif" alt="bg1"></div>
    <div class="cell"><img src="background2.gif" alt="bg2"></div>
    <div class="cell"><img src="background3.gif" alt="bg3"></div>
    <div class="cell"><img src="background4.gif" alt="bg4"></div>
    <div class="overlay">
      <h1>CONNECTING TO THE WIRED</h1>
    </div>
  </div>
</body>
</html>
